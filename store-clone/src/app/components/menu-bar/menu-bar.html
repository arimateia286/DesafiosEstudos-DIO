<header class="fixed top-0 z-10 flex w-full min-h-[8vh] items-center bg-white shadow-sm">
  <div class="mx-auto flex w-full max-w-7xl items-center gap-4 px-4 sm:px-6 lg:px-8">
    <img src="images/ps-logo.png" alt="PlayStation Store" class="h-6 shrink-0 sm:h-7 lg:h-8" />

    <nav
      class="flex flex-1 items-center justify-center gap-4 overflow-x-auto whitespace-nowrap text-[11px] font-semibold uppercase tracking-widest text-neutral-800 sm:gap-6 sm:text-xs lg:text-sm">
      @for (link of links; track link.url) {
      <a class="shrink-0 transition-colors duration-150 hover:text-blue-600" [href]="link.url" target="_blank"
        rel="noopener noreferrer" [attr.aria-label]="link.label">
        {{ link.label }}
      </a>
      }
    </nav>
  </div>
</header>
