<div
  class="group relative flex w-full flex-col overflow-hidden border-2 border-transparent transition-colors duration-200 hover:border-white">
  <div class="relative aspect-7/10 w-full overflow-hidden">
    <img class="h-full w-full object-cover transition-transform duration-300 ease-out group-hover:scale-110"
      [src]="game().cover" [alt]="game().title" loading="lazy" />

    <div class="absolute bottom-0 w-full flex flex-col gap-1 bg-black/85 px-2.5 py-2 text-white sm:px-3">
      @if (game().label) {
      <span
        class="absolute -top-10 right-0 bg-black/90 px-2 py-1 text-[10px] font-semibold uppercase tracking-wider text-white sm:px-3 sm:text-[11px]">
        {{ game().label }}
      </span>
      }

      <span class="truncate text-xs font-semibold sm:text-sm lg:text-base">{{ game().title }}</span>
      <div class="flex items-center justify-between gap-2">
        <div class="flex min-w-0 items-center gap-2 text-[10px] sm:text-[11px] lg:text-xs">
          <span class="h-3.5 w-1 shrink-0 bg-cyan-500"></span>
          <span>{{ game().type }}</span>
          <span class="text-neutral-300">| {{ game().platforms.join(' | ')}}
          </span>
        </div>
        <span class="shrink-0 text-base font-bold sm:text-xl lg:text-2xl">{{ game().price | currency: 'BRL' }}</span>
      </div>
    </div>
  </div>
</div>
