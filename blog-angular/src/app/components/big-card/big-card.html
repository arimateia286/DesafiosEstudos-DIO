<article
  class="group flex flex-col gap-2 font-semibold border-b-2 pb-4 cursor-pointer border-white/10 md:pb-0 md:border-none"
  [routerLink]="['/news', news().id]">
  <div class="w-full aspect-3/2 overflow-hidden bg-zinc-900">
    <img [src]="news().coverUrl" [alt]="news().title" class="w-full h-full object-cover" loading="lazy">
  </div>
  <span class="text-zinc-500 text-xs md:text-sm uppercase tracking-wider">{{ news().date }}</span>
  <h3 class="text-zinc-100 text-2xl md:text-3xl leading-tight group-hover:text-zinc-300 transition-colors">
    {{ news().title }}</h3>
  <p class="text-zinc-400 font-normal leading-relaxed text-base md:text-lg line-clamp-2">{{ news().content }}</p>
</article>
