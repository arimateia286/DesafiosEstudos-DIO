<header class="w-full px-6 md:px-12 py-5 flex items-center gap-8 border-b-2 border-white/10 mb-4">
    <h1 class="uppercase text-2xl font-black text-white text-end leading-none tracking-tight whitespace-nowrap cursor-pointer"
        [routerLink]="['/']">
        Ari Blog</h1>
    <nav class="w-full flex items-center justify-end gap-4 text-xs font-bold uppercase tracking-widest text-zinc-500">
        @for (link of socialLinks; track link.url) {
        <a class="flex items-center gap-1 hover:text-zinc-100 transition-colors" [href]="link.url" target="_blank"
            rel="noopener noreferrer" [attr.aria-label]="link.label">{{ link.label }}<i
                [class]="link.icon + ' text-base'"></i></a>
        }
    </nav>
</header>
