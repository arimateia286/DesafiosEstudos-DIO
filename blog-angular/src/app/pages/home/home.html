<div class="w-full">
  <div class="max-w-4xl mx-auto px-6 md:px-12">
    <div class="flex justify-between items-center pb-2 mb-6 md:mb-10 border-b-2 border-white/10">
      <h1 class="text-zinc-100 font-black text-2xl leading-tight">Recentes</h1>
      <a class="text-zinc-500 text-xs md:text-sm uppercase tracking-wider hover:text-zinc-100 transition-colors"
        [routerLink]="['/all-news']">Ver todas <i class="fa-solid fa-arrow-right"></i></a>
    </div>
    @if (news.length) {
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-12">
      <app-big-card [news]="news[0]"></app-big-card>
      <div class="flex flex-col gap-6 justify-between">
        @if (news[1]) {
        <app-small-card [news]="news[1]"></app-small-card>
        <hr class="border border-white/10">
        }
        @if (news[2]) {
        <app-small-card [news]="news[2]"></app-small-card>
        <hr class="border border-white/10">
        }
        @if (news[3]) {
        <app-small-card [news]="news[3]"></app-small-card>
        }
      </div>
    </div>
    } @else {
    <h2 class="text-zinc-100 font-black text-2xl md:text-4xl mb-4 w-full text-center">Nenhuma noticia encontrada</h2>
    }
  </div>
</div>
