<div class="max-w-4xl mx-auto min-h-screen px-6 md:px-12">
  <h1 class="text-zinc-100 font-black text-2xl leading-tight pb-2 mb-6 md:mb-10 border-b-2 border-white/10">Todas as
    notícias</h1>

  @if (news.length) {
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 gap-x-12 divide-y-2 divide-white/10">
    @for (item of news; track item.id) {
    <app-small-card [news]="item" class="group pb-4"></app-small-card>
    }
  </div>
  } @else {
  <p class="text-zinc-500 text-base md:text-lg text-center py-16">Nenhuma notícia encontrada.</p>
  }
</div>
